<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音频时间包络辨识实验</title>
    <style>
        :root { --primary: #007AFF; --bg: #f5f5f7; --card: #ffffff; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        #app { width: 95%; max-width: 500px; background: var(--card); padding: 40px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }
        .hidden { display: none; }
        button { background: var(--primary); color: white; border: none; padding: 14px 28px; border-radius: 12px; font-size: 16px; cursor: pointer; transition: 0.3s; margin: 10px 0; width: 100%; }
        button:disabled { background: #d2d2d7; cursor: not-allowed; }
        .option-btn { background: #f2f2f7; color: #1d1d1f; border: 1px solid #d2d2d7; margin: 8px 0; text-align: left; padding: 16px; font-weight: 500; }
        .option-btn:hover { background: #e5e5ea; }
        .icon { font-size: 60px; margin-bottom: 24px; }
        .progress { font-size: 14px; color: #86868b; margin-bottom: 20px; }
        input, select { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #d2d2d7; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .feedback { margin-top: 20px; font-size: 18px; font-weight: bold; min-height: 24px; }
    </style>
</head>
<body>

<div id="app">
    <div id="step-1">
        <div class="icon">🎧</div>
        <h2>辨认声音测试</h2>
        <p>大约 3-5 分钟即可完成。</p>
        <p style="font-size: 14px; color: #86868b;">本实验不会搜集个人隐私信息。</p>
        <button onclick="showStep(2)">开始实验</button>
    </div>

    <div id="step-2" class="hidden">
        <h2>背景信息</h2>
        <input type="text" id="username" placeholder="您的称呼">
        <input type="number" id="age" placeholder="您的年龄">
        <select id="gender">
            <option value="">请选择性别</option>
            <option value="男">男</option>
            <option value="女">女</option>
        </select>
        <select id="ability">
            <option value="">自评声音识别能力</option>
            <option value="非常强">非常强</option>
            <option value="较强">较强</option>
