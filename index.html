<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音频辨识实验</title>
    <style>
        :root { --primary: #007AFF; --bg: #f5f5f7; --card: #ffffff; --text: #1d1d1f; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        #app { width: 95%; max-width: 460px; background: var(--card); padding: 40px; border-radius: 28px; box-shadow: 0 12px 40px rgba(0,0,0,0.08); text-align: center; }
        .hidden { display: none; }
        button { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 14px; font-size: 16px; font-weight: 500; cursor: pointer; transition: 0.2s; margin: 10px 0; width: 100%; }
        button:hover { opacity: 0.9; transform: scale(0.98); }
        button:disabled { background: #d2d2d7; cursor: not-allowed; }
        .option-btn { background: #f5f5f7; color: var(--text); border: 1px solid #d2d2d7; text-align: left; padding: 16px; margin: 8px 0; }
        input, select { width: 100%; padding: 16px; margin: 12px 0; border: 1px solid #d2d2d7; border-radius: 12px; font-size: 16px; box-sizing: border-box; background: #fbfbfd; }
        .progress { font-size: 13px; color: #86868b; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }
        .feedback { margin-top: 20px; font-size: 18px; font-weight: 600; min-height: 28px; }
        .backup-area { background: #fff2f2; border: 1px solid #ff3b30; padding: 15px; border-radius: 12px; margin-top: 20px; text-align: left; }
        textarea { width: 100%; height: 80px; font-family: monospace; font-size: 11px; margin-top: 10px; border: 1px solid #d2d2d7; padding: 8px; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="app">
    <div id="step-1">
        <div style="font-size: 50px; margin-bottom: 20px;">🎧</div>
        <h2>音频辨识实验</h2>
        <p>音频序列已固定打乱。请戴上耳机开始测试。</p>
        <button onclick="showStep(2)">开始实验</button>
    </div>

    <div id="step-2" class="hidden">
        <h2>背景信息</h2>
        <input type="text" id="username" placeholder="您的称呼">
        <input type="number" id="age" placeholder="您的年龄（必填）">
        <select id="gender"><option value="">选择性别</option><option value="男">男</option><option value="女">女</option></select>
        <select id="ability"><option value="">自评识别能力</option><option value="非常强">非常强</option><option value="较强">较强</option><option value="一般">一般</option><option value="较弱">较弱</option><option value="非常弱">非常弱</option></select>
        <button onclick="checkInfo()">进入热身阶段</button>
    </div>

    <div id="step-test" class="hidden">
        <div id="progress-text" class="progress"></div>
        <p id="play-count-text">剩余播放：2次</p>
        <button id="play-btn" onclick="handlePlay()">播放声音</button>
        <div id="options-container" class="hidden"><div id="options-list"></div></div>
        <div id="test-feedback" class="feedback"></div>
    </div>

    <div id="step-end" class="hidden">
        <div style="font-size: 50px; margin-bottom: 20px;">✨</div>
        <h2>实验完成</h2>
        <p>数据已同步，感谢参与！</p>
    </div>
</div>

<script>
    // --- 硬件凭证（使用 REST API 模式，不依赖任何库） ---
    const BMOB_APP_ID = "1f4786ed80f3f863ce99617f4c1a9232";
    const BMOB_REST_KEY = "a752573cbe0eda46768f8cfb71a44cef";

    const audioPath = "audio/";
    const practiceTasks = [
        { id: "piano_Forward", options: ["钢琴声", "管风琴声", "鼓声", "电击声", "敲门声"], answer: "钢琴声" },
        { id: "testring_Forward", options: ["玻璃破碎声", "电话声", "直升机声", "发条声", "引擎声"], answer: "电话声" },
        { id: "testtrain_Reversed", options: ["象鸣声", "闹铃声", "火车声", "警报声", "拖椅子声"], answer: "火车声" }
    ];
    const formalTasks = [
        { id: "bell_Forward", options: ["闹铃声", "发条声", "敲击铁盆声", "玩具声", "鸡叫声"], answer: "闹铃声" },
        { id: "bell_Reversed", options: ["发条声", "鸡叫声", "闹铃声", "收银机声", "钱币碰撞声"], answer: "闹铃声" },
        { id: "duck_Forward", options: ["木板嘎吱声", "木椅子声", "钻木声", "橡皮鸭声", "鸭叫声"], answer: "鸭叫声" },
        { id: "duck_Reversed", options: ["钻木声", "木板嘎吱声", "鸭叫声", "橡皮鸭声", "锯木声"], answer: "鸭叫声" },
        { id: "engine_Forward", options: ["强风声", "打鼾声", "引擎声", "象鸣声", "伐木声"], answer: "引擎声" },
        { id: "engine_Reversed", options: ["打鼾声", "象鸣声", "强风声", "引擎声", "轮机声"], answer: "引擎声" },
        { id: "keyboard_Forward", options: ["键盘声", "小跑声", "拍面团声", "剁肉声", "咂嘴声"], answer: "键盘声" },
        { id: "keyboard_Reversed", options: ["直升机声", "剁肉声", "键盘声", "敲黑板声", "小跑声"], answer: "键盘声" },
        { id: "knock_Forward", options: ["敲门声", "弹珠声", "高跟鞋声", "积木声", "保龄球声"], answer: "敲门声" },
        { id: "knock_Reversed", options: ["直升机声", "强风声", "弹珠声", "啄木鸟声", "敲门声"], answer: "敲门声" },
        { id: "leaves_Forward", options: ["流沙声", "风吹树叶声", "海浪声", "雷雨声", "车行驶声"], answer: "风吹树叶声" },
        { id: "leaves_Reversed", options: ["车行驶声", "流沙声", "海浪声", "风吹树叶声", "雷雨声"], answer: "风吹树叶声" },
        { id: "rain_Forward", options: ["暴雨声", "流沙声", "淋浴声", "挤压塑料声", "拖拽纸箱声"], answer: "暴雨声" },
        { id: "rain_Reversed", options: ["抽水声", "淋雨声", "挤压塑料声", "暴雨声", "拖拽纸箱声"], answer: "暴雨声" },
        { id: "testcrushedbottle_Forward", options: ["油沸腾声", "挤压塑料声", "木板嘎吱声", "放屁声", "弹珠声"], answer: "挤压塑料声" },
        { id: "testcrushedbottle_Reversed", options: ["拉链声", "木板嘎吱声", "放屁声", "油沸腾声", "抽水声"], answer: "抽水声" },
        { id: "walk_Forward", options: ["走楼梯声", "射击声", "钻地声", "鞭炮声", "弹珠声"], answer: "走楼梯声" },
        { id: "walk_Reversed", options: ["史莱姆声", "吮吸声", "钻地声", "走楼梯声", "射击声"], answer: "走楼梯声" },
        { id: "wave_Forward", options: ["强风声", "海浪声", "流沙声", "风吹树叶声", "雷声"], answer: "海浪声" },
        { id: "wave_Reversed", options: ["车行驶声", "强风声", "风吹树叶声", "海浪声", "流沙声"], answer: "海浪声" }
    ];

    let state = { tasks: [], index: 0, isPractice: true, plays: 0, results: [], audio: new Audio() };

    function seededShuffle(array, seed) {
        let m = array.length, t, i;
        while (m) {
            let x = Math.sin(seed++) * 10000;
            i = Math.floor((x - Math.floor(x)) * m--);
            t = array[m]; array[m] = array[i]; array[i] = t;
        }
        return array;
    }

    function showStep(s) {
        document.querySelectorAll('#app > div').forEach(d => d.classList.add('hidden'));
        const target = document.getElementById(s === 'test' ? 'step-test' : 'step-' + s);
        if(target) target.classList.remove('hidden');
    }

    function checkInfo() {
        if(!document.getElementById('age').value) return alert("请填写年龄");
        state.tasks = practiceTasks;
        showStep('test');
        loadTask();
    }

    function loadTask() {
        const t = state.tasks[state.index];
        document.getElementById('progress-text').innerText = (state.isPractice ? '热身题 ' : '正式题 ') + (state.index + 1) + ' / ' + state.tasks.length;
        document.getElementById('options-container').classList.add('hidden');
        document.getElementById('test-feedback').innerText = "";
        state.plays = 0;
        updateUI();
        state.audio.src = audioPath + t.id + ".wav";
        state.audio.load();
    }

    function updateUI() {
        document.getElementById('play-count-text').innerText = "剩余播放次数：" + (2 - state.plays);
        document.getElementById('play-btn').disabled = (state.plays >= 2);
    }

    function handlePlay() {
        if(state.plays < 2) {
            state.audio.play();
            state.plays++;
            updateUI();
            state.audio.onended = () => {
                document.getElementById('options-container').classList.remove('hidden');
                renderOptions();
            };
        }
    }

    function renderOptions() {
        const list = document.getElementById('options-list');
        list.innerHTML = "";
        state.tasks[state.index].options.forEach(opt => {
            const b = document.createElement('button');
            b.className = "option-btn";
            b.innerText = opt;
            b.onclick = () => selectOption(opt);
            list.appendChild(b);
        });
    }

    function selectOption(opt) {
        const t = state.tasks[state.index];
        const ok = (opt === t.answer);
        if(state.isPractice) {
            const fb = document.getElementById('test-feedback');
            fb.innerText = ok ? "✅ 正确" : "❌ 错误";
            setTimeout(() => {
                if(++state.index < state.tasks.length) loadTask();
                else {
                    state.isPractice = false;
                    state.index = 0;
                    state.tasks = seededShuffle([...formalTasks], 2026);
                    loadTask();
                }
            }, 1000);
        } else {
            state.results.push({ id: t.id, choice: opt, correct: ok });
            if(++state.index < state.tasks.length) loadTask();
            else submitData();
        }
    }

    async function submitData() {
        const loadingDiv = document.getElementById('step-test');
        loadingDiv.innerHTML = "<h3>正在同步实验结果...</h3>";
        
        const payload = {
            username: document.getElementById('username').value || "匿名",
            age: parseInt(document.getElementById('age').value),
            gender: document.getElementById('gender').value,
            ability: document.getElementById('ability').value,
            results_json: JSON.stringify(state.results)
        };

        const backupText = `姓名:${payload.username} | 年龄:${payload.age} | 结果:${payload.results_json}`;

        try {
            // 直接调用 Bmob REST API，不使用任何外部库
            const response = await fetch("https://api2.bmob.cn/1/classes/ExperimentResult", {
                method: "POST",
                headers: {
                    "X-Bmob-Application-Id": BMOB_APP_ID,
                    "X-Bmob-REST-API-Key": BMOB_REST_KEY,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                showStep('end');
            } else {
                throw new Error("API报错");
            }
        } catch (e) {
            loadingDiv.innerHTML = `
                <div class="backup-area">
                    <p style="color:#ff3b30; font-weight:bold;">⚠️ 自动上传失败（网络安全限制）</p>
                    <p style="font-size:12px;">请点击下方文本框，全选并复制结果发送给馆长：</p>
                    <textarea readonly onclick="this.select()">${backupText}</textarea>
                    <button onclick="showStep('end')" style="margin-top:10px; background:#34c759;">我已复制并发送</button>
                </div>
            `;
        }
    }
</script>
</body>
</html>
